<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety-Sync | Safety Companion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="#">

    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00ffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script src="script.js"></script>

</head>
<body>
    <div class="container" id="app">

        <h2 id="status-title">Alert Timer</h2>
        
        <div id="timer-display">00:00</div>

        <div id="settings-area" style="display:none;">
            <h3>Set Your Secret PIN</h3>
            <br>
            <div class="input-group">
                <input type="password" id="new-pin" placeholder="Set 4-Digit PIN">
                <span class="toggle-eye" onclick="togglePinVisibility('new-pin')">👁️</span>
            </div>
            <button onclick="saveSettings()" class="btn-save">Save PIN</button> 
            <button onclick="toggleSettings()" class="btn-back">Back</button>

            <!-- DEBUG AREA -->
            <div id="debug-panel" style="display:none; background:#111; color:#0f0; font-family:monospace; padding:10px; font-size:10px; border-top:1px solid #333; max-height:150px; overflow-y:auto;">
                <strong>[SYSTEM LOG]</strong>
                <div id="debug-logs"></div>
                <button onclick="viewIndexedDB()" style="background:#222; color:#0f0; border:1px solid #0f0; margin-top:5px; cursor:pointer;">Verify Offline DB</button>
            </div>
            <!-- Debug Ends -->

        </div>

<button onclick="toggleSettings()" id="settings-btn">⚙️ Settings</button>

        <div id="setup-area" autocomplete="off">
            <input type="text" id="user-name-input" placeholder="Enter Your Name" required>
            
            <div class="time-input-container" style="
                display: flex; 
                align-items: center; 
                justify-content: center; 
                gap: 20px; 
                margin: 25px 0;
                padding: 20px;
                background: rgba(255,255,255,0.03);
                border-radius: 15px;
                border: 1px solid rgba(255,255,255,0.05);
            ">
                <div style="display: flex; flex-direction: column; align-items: center;">
                        <input type="number" id="input-hours" class="no-spin" placeholder="00" min="0" max="23" 
                            oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2);" 
                            style="width: 80px; background: transparent; border: none; border-bottom: 2px solid #333; color: #00ffff; font-size: 2.2rem; text-align: center; font-weight: 200; outline: none;">
                        <span style="font-size: 0.65rem; color: #555; margin-top: 8px; letter-spacing: 1px;">HOURS</span>
                    </div>

                    <div style="font-size: 2rem; color: #222; margin-top: -20px;">:</div>

                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <input type="number" id="input-mins" class="no-spin" placeholder="00" min="0" max="59" 
                            oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2);" 
                            style="width: 80px; background: transparent; border: none; border-bottom: 2px solid #333; color: #00ffff; font-size: 2.2rem; text-align: center; font-weight: 200; outline: none;">
                        <span style="font-size: 0.65rem; color: #555; margin-top: 8px; letter-spacing: 1px;">MINUTES</span>
                </div>
            </div>

            <input type="tel" id="contact" placeholder="Emergency Contact Number">
            <input type="email" id="contact-email" placeholder="Emergency Contact Email">
            <div class="legal-consent-wrapper" autocomplete="off" style="
                display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; font-family: monospace;max-width: 90%;margin-left: auto;margin-right: auto;
            ">

            <!-- ToS Agreement -->
                <input type="checkbox" id="tos-check" style="
                    width: 18px; 
                    height: 18px; 
                    cursor: pointer;
                    margin: 0; /* Important: removes browser default margins */
                    accent-color: #00ffff; /* Pure Cyan tick on modern browsers */
                " checked>
                
                <label for="tos-check" style="
                    font-size: 0.7rem; 
                    color: #888; 
                    text-align: left; 
                    line-height: 1.3;
                    cursor: pointer;
                    user-select: none;
                ">
                    I agree to the 
                    <a href="legal.html" style="color: #00ffdd; text-decoration: none;" target="_blank">Terms of Service</a> 
                    and allow GPS tracking during active timers.
                </label>
            </div>
            <button onclick="attemptStart()" disabled style="opacity: 0.5;" id="start-session-btn" class="btn-start">Start Session</button>
        </div>

        <div id="active-area" style="display:none;">


            <div style="margin-top: 20px; text-align: center;">
                <button id="snooze-btn" onclick="userSnooze()" style="
                    background: transparent; 
                    border: 1px solid #00ffff; 
                    color: #00ffff; 
                    padding: 10px 20px; 
                    border-radius: 20px; 
                    font-family: 'Inter', sans-serif;
                    font-size: 0.8rem;
                    cursor: pointer;
                    transition: 0.3s;
                ">
                    +5 MIN SNOOZE
                </button>
                <br>
                <p style="font-size: 0.6rem; color: #555; margin-top: 8px;">Need more time? Extend without PIN.</p>
            </div>

            <br>


            <div id="pin-verification">
                <div class="input-group">
                <div class="input-group">
                    <input type="password" id="pin-input" placeholder="Enter PIN to Stop">
                    <span class="toggle-eye-stop" onclick="togglePinVisibility('pin-input')">👁️</span>
                </div>
                <button onclick="checkSafe()" class="btn-safe">I am Safe</button>

                <p style="margin-top:15px; font-size:0.8rem;">
                    <a href="javascript:void(0)" onclick="triggerForgotPIN()" style="color:#bbb;">Forgot PIN? Use Emergency Contact</a>
                </p>
            </div>

            <div id="bypass-verification" style="display:none;">
                <input type="tel" id="bypass-phone" placeholder="Enter Emergency Phone Number">
                <button onclick="checkBypass()" style="background:#444;">VERIFY & STOP</button>
                <p><a href="#" onclick="hideBypass()" style="color:#bbb;">Back to PIN</a></p>
            </div>

            <p class="warning-text">If timer hits 0, emergency contacts will be alerted.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
